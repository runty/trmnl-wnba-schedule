# TRMNL Recipe: WNBA Team Schedule
# A visual calendar of upcoming games for a selected WNBA team.

uuid: ""  # Generated by TRMNL on plugin creation
name: "WNBA Team Schedule"
author: "phobus"
author_email: ""
homepage: ""
description: >
  A visual calendar of upcoming games for a selected WNBA team.
  Choose a filter of home games only, away games only or both types of games.
  Data sourced from ESPN.

markup_version: 1
strategy: polling
refresh_frequency: 43200  # 12 hours

# Polling configuration
# Replace YOUR_GITHUB_USERNAME with your actual GitHub username before publishing
polling_url: "https://YOUR_GITHUB_USERNAME.github.io/trmnl-wnba-schedule/teams/{{ team }}.json"
polling_verb: GET

layouts:
  - full
  - half_horizontal
  - half_vertical
  - quadrant

categories:
  - Sports
  - Calendar

# Custom form fields defined in form_fields.yml
